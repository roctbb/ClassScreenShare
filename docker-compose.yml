version: '3.8'

services:
  proctoring:
    build: .
    container_name: proctoring-server
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PASSWORD=${PASSWORD:-admin}
      - PORT=3000
      - ENABLE_RECORDING=${ENABLE_RECORDING:-true}
      - RECORDINGS_DIR=/app/recordings
      - CAPTURE_INTERVAL=${CAPTURE_INTERVAL:-5000}
      - IMAGE_QUALITY=${IMAGE_QUALITY:-0.8}
      - IMAGE_WIDTH=${IMAGE_WIDTH:-1080}
      - INACTIVITY_TIMEOUT=${INACTIVITY_TIMEOUT:-15000}
      - VIDEO_FPS=${VIDEO_FPS:-2}
      - VIDEO_FORMAT=${VIDEO_FORMAT:-mp4}
    volumes:
      # Монтируем директорию для записей на хост
      - ./recordings:/app/recordings
    restart: unless-stopped
    networks:
      - proctoring-network

networks:
  proctoring-network:
    driver: bridge
